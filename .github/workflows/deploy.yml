name: Deploy to ID server (staging)!

# Redeploys ORAD to the ID server whenever master is updated.
#
# Requires these GitHub Actions secrets (Settings > Secrets and variables > Actions):
#   SSH_HOST  - the ID server hostname / public IP
#   SSH_USER  - deploy user (currently: root)
#   SSH_KEY   - private key whose public half is in the server's ~/.ssh/authorized_keys
#   SSH_PORT  - (optional) SSH port; defaults to 22
#
# The server clone at /var/www/staging/orad-ghipss must have `origin` pointing at
# this repo (Interactive-Digital-Gh/orad-ghipss). The workflow hard-resets the
# clone to origin/master, so do NOT keep uncommitted local edits on the server.
# Seeding is intentionally NOT run here (the seed resets the admin password).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-id-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            export PATH=/root/.nvm/versions/node/v22.22.3/bin:$PATH
            cd /var/www/staging/orad-ghipss

            echo "==> Syncing code to origin/master"
            git fetch --all --prune
            git reset --hard origin/master

            echo "==> Backend: install deps, generate client, apply migrations"
            cd server
            npm ci
            npx prisma generate
            npx prisma migrate deploy

            echo "==> Frontend: install deps and build (served by the Node process)"
            cd ../client
            npm ci
            npm run build

            echo "==> Restarting service"
            systemctl restart orad
            systemctl is-active orad

            echo "==> Waiting for the app to listen on :5002 (migrate + boot takes a few seconds)"
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:5002/; then
                echo "local health check: OK after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: app did not become healthy within 30s"
                journalctl -u orad -n 40 --no-pager || true
                exit 1
              fi
              sleep 1
            done
            echo "==> Deploy complete"
